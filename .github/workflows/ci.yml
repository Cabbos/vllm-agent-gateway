name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
      - name: Type check
        run: mypy src
      - name: Test
        run: pytest -q --cov=vllm_agent_gateway --cov-report=term-missing

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pip-audit
        run: python -m pip install "pip-audit>=2.7,<3"
      - name: Audit resolved project dependencies
        run: python -m pip_audit . --strict --progress-spinner off

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate Compose configuration
        env:
          MODEL_PATH: /tmp/model
        run: docker compose config --quiet
      - name: Build gateway image
        run: docker build --tag vllm-agent-gateway:ci .
